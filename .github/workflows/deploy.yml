name: deploy python

on:
  push:
    branches:
      - master

env:
  IMAGE: mohamedd69/sportgestions-python
  APP_DIR: /opt/applications/sportgestions/python
  PROJECT: sportgestions-python

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Préparer le dossier sur le VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: mkdir -p ${{ env.APP_DIR }}

      - name: Copier le compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          source: "compose.yml"
          target: ${{ env.APP_DIR }}

      - name: Pull + (re)démarrage
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ env.APP_DIR }}
            docker-compose -p ${{ env.PROJECT }} --env-file ../.env pull
            # docker-compose v1 plante sur "recreate" (KeyError ContainerConfig) -> on recree a neuf
            docker-compose -p ${{ env.PROJECT }} --env-file ../.env rm -sf || true
            docker-compose -p ${{ env.PROJECT }} --env-file ../.env up -d
            docker image prune -f
